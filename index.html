<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameZone - Play Free Games</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
}

header{
  background:#111;
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  letter-spacing:2px;
}

nav{
  background:#1c1c1c;
  display:flex;
  justify-content:center;
  gap:30px;
  padding:15px;
}

nav a{
  color:white;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover{
  color:#00ffcc;
}

.container{
  padding:40px 10%;
}

.games{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

.card{
  background:#1f1f1f;
  border-radius:15px;
  overflow:hidden;
  transition:0.4s;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:20px;
  text-align:center;
}

.card-content h3{
  margin-bottom:10px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00ffcc;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#00ccaa;
}

footer{
  text-align:center;
  padding:20px;
  background:#111;
  margin-top:40px;
}
</style>
</head>

<body>

<header>🎮 GameZone</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Action</a>
  <a href="#">Racing</a>
  <a href="#">Puzzle</a>
</nav>

<div class="container">
  <div class="games">

    <div class="card">
      <img src="https://picsum.photos/400/300?random=1">
      <div class="card-content">
        <h3>Car Racing</h3>
        <button onclick="playGame('Car Racing')">Play Now</button>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?random=2">
      <div class="card-content">
        <h3>Space Shooter</h3>
        <button onclick="playGame('Space Shooter')">Play Now</button>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/300?random=3">
      <div class="card-content">
        <h3>Snake Game</h3>
        <button onclick="playGame('Snake Game')">Play Now</button>
      </div>
    </div>

  </div>
</div>

<footer>
  © 2026 GameZone | All Rights Reserved
</footer>

<script>
function playGame(gameName){
  alert("Starting " + gameName + "...");
}
</script>

</body>
</html>
