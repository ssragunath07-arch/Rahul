<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Racing Game</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#222;
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
}

h1{
  margin:10px;
}

#score{
  font-size:20px;
}

.gameArea{
  position:relative;
  width:400px;
  height:600px;
  margin:20px auto;
  background:#555;
  overflow:hidden;
  border-left:6px solid white;
  border-right:6px solid white;
}

.roadLine{
  position:absolute;
  width:10px;
  height:100px;
  background:white;
  left:195px;
}

.car, .enemy{
  position:absolute;
  width:50px;
  height:90px;
  border-radius:10px;
}

.car{
  background:#00ffcc;
  bottom:20px;
  left:175px;
}

.enemy{
  background:#ff4d4d;
}
  
#gameOver{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  display:none;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:5px;
  background:#00ffcc;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🚗 Car Racing Game</h1>
<div id="score">Score: 0</div>

<div class="gameArea" id="gameArea">
  <div id="gameOver">
    <h2>Game Over</h2>
    <button onclick="startGame()">Restart</button>
  </div>
</div>

<script>
const gameArea = document.getElementById("gameArea");
const scoreDisplay = document.getElementById("score");
const gameOver = document.getElementById("gameOver");

let player = { speed:5, score:0 };
let keys = { ArrowLeft:false, ArrowRight:false };
let gameRunning = false;

document.addEventListener("keydown", e=>{
  if(keys.hasOwnProperty(e.key)) keys[e.key] = true;
});

document.addEventListener("keyup", e=>{
  if(keys.hasOwnProperty(e.key)) keys[e.key] = false;
});

function startGame(){
  gameArea.innerHTML = "";
  gameArea.appendChild(gameOver);
  gameOver.style.display = "none";

  player.speed = 5;
  player.score = 0;
  gameRunning = true;

  // Road lines
  for(let x=0; x<5; x++){
    let line = document.createElement("div");
    line.classList.add("roadLine");
    line.y = x * 150;
    line.style.top = line.y + "px";
    gameArea.appendChild(line);
  }

  // Player car
  let car = document.createElement("div");
  car.setAttribute("class","car");
  gameArea.appendChild(car);
  player.x = car.offsetLeft;
  player.y = car.offsetTop;

  // Enemies
  for(let x=0; x<3; x++){
    let enemy = document.createElement("div");
    enemy.setAttribute("class","enemy");
    enemy.y = (x+1) * -300;
    enemy.style.top = enemy.y + "px";
    enemy.style.left = Math.floor(Math.random()*350) + "px";
    gameArea.appendChild(enemy);
  }

  window.requestAnimationFrame(playGame);
}

function moveLines(){
  let lines = document.querySelectorAll(".roadLine");
  lines.forEach(line=>{
    if(line.y >= 600){
      line.y -= 750;
    }
    line.y += player.speed;
    line.style.top = line.y + "px";
  });
}

function moveEnemies(car){
  let enemies = document.querySelectorAll(".enemy");
  enemies.forEach(enemy=>{
    if(isCollide(car, enemy)){
      endGame();
    }
    if(enemy.y >= 600){
      enemy.y = -300;
      enemy.style.left = Math.floor(Math.random()*350) + "px";
    }
    enemy.y += player.speed;
    enemy.style.top = enemy.y + "px";
  });
}

function isCollide(a,b){
  let aRect = a.getBoundingClientRect();
  let bRect = b.getBoundingClientRect();
  return !(
    aRect.bottom < bRect.top ||
    aRect.top > bRect.bottom ||
    aRect.right < bRect.left ||
    aRect.left > bRect.right
  );
}

function playGame(){
  if(!gameRunning) return;

  let car = document.querySelector(".car");
  let road = gameArea.getBoundingClientRect();

  moveLines();
  moveEnemies(car);

  if(keys.ArrowLeft && player.x > 0){
    player.x -= player.speed + 2;
  }
  if(keys.ArrowRight && player.x < (road.width - 50)){
    player.x += player.speed + 2;
  }

  car.style.left = player.x + "px";

  player.score++;
  scoreDisplay.innerText = "Score: " + player.score;

  player.speed = 5 + Math.floor(player.score / 500);

  window.requestAnimationFrame(playGame);
}

function endGame(){
  gameRunning = false;
  gameOver.style.display = "block";
}
</script>

</body>
</html>
